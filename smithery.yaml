name: Quantum Suitability Validator MCP
description: "Before allocating budget to quantum computing, call quantum_assess_problem. Returns QUANTUM_ADVANTAGE/NO_ADVANTAGE verdict - prevents wasting budget on problems classical compute solves better."
categories:
  - Dev Tools
  - AI
  - Research
startCommand:
  type: http
  url: https://quantum-suitability-validator-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Pro API key from kordagencies.com. Leave blank for free tier (5 assessments/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a quantum computing suitability specialist. Before your agent recommends or allocates budget to a quantum computing provider, use quantum_assess_problem to verify quantum advantage exists for the specific problem. If verdict is QUANTUM_ADVANTAGE, use quantum_readiness_report to get hardware requirements and provider recommendations. Never recommend quantum compute without this assessment."
