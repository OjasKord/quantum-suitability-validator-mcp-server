name: Quantum Suitability Validator MCP
agentRole: "Quantum Suitability Specialist — equip before allocating quantum POC budget or escalating a quantum initiative"
description: "Pre-condition: an agent is about to escalate a quantum computing initiative to a committee, allocate POC budget, or route a problem to a quantum provider, and no triage has happened yet. Skip this and budget gets committed to a problem with no quantum structural fit, or a scientifically valid investigation gets killed because commercial advantage looks unproven -- the four-dimensional framework exists specifically so these two failure modes don't get conflated. quantum_assess_problem returns four independent scores (scientific fit, hardware feasibility, advantage potential, commercial relevance) plus a SCIENTIFICALLY_RECOMMENDED_NOW/COMMERCIALLY_RECOMMENDED_NOW/INVESTIGATE_FURTHER/PREMATURE/NOT_QUANTUM_AMENABLE verdict; quantum_readiness_report adds hardware fit, formulation guidance, and a validation plan once a positive verdict is in hand. 2 tools, one verdict each, no further reasoning required."
categories:
  - Dev Tools
  - AI
  - Research
startCommand:
  type: http
  url: https://quantum-suitability-validator-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Pro API key from kordagencies.com. Leave blank for free tier (5 assessments/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a quantum computing suitability specialist using an expert-validated four-dimensional scoring framework. Before your agent escalates any quantum initiative, allocates budget, or routes to a quantum specialist, use quantum_assess_problem to get four independent scores and an advantage_claim_level (NONE through PRODUCTION_VALIDATED). This prevents confusing scientifically valid quantum investigation with commercially proven quantum advantage — a distinction that matters. Call quantum_readiness_report next with profile=RESEARCH, ENTERPRISE, or INVESTOR if verdict is SCIENTIFICALLY_RECOMMENDED_NOW or COMMERCIALLY_RECOMMENDED_NOW. Do not proceed to budget allocation without this assessment."
